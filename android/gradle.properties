org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true

# Pub cache and project can live on different Windows drives (e.g. H: vs L:).
# Kotlin's incremental compiler cannot relativize file paths across drive roots and
# crashes while closing its caches ("Could not close incremental caches ... this and
# base files have different roots"). Disabling incremental Kotlin compilation avoids
# that buggy code path. Full (non-incremental) compilation is unaffected.
kotlin.incremental=false
